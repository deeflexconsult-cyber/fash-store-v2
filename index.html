<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FASH VARIETIES - Kitchen, Fashion & More</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
   .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-orange-600">FASH VARIETIES</h1>
      <button onclick="toggleCart()" class="relative bg-orange-600 text-white px-4 py-2 rounded-lg">
        Cart <span id="cartCount" class="bg-white text-orange-600 rounded-full px-2 ml-1">0</span>
      </button>
    </div>
  </header>

  <!-- Products Grid -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <div id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
  </main>

  <!-- Cart Sidebar -->
  <div id="cartSidebar" class="fixed right-0 top-0 h-full w-96 bg-white shadow-2xl transform translate-x-full transition-transform z-50 overflow-y-auto">
    <div class="p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Your Cart</h2>
        <button onclick="toggleCart()" class="text-2xl">&times;</button>
      </div>
      <div id="cartItems"></div>
      <div class="border-t pt-4 mt-4">
        <div class="flex justify-between mb-2">
          <span>Subtotal:</span>
          <span id="subtotal">₦0</span>
        </div>
        <div class="flex justify-between mb-2 text-green-600">
          <span>Volume Discount:</span>
          <span id="discount">-₦0</span>
        </div>
        <div class="flex justify-between font-bold text-lg">
          <span>Total:</span>
          <span id="total">₦0</span>
        </div>
        <button onclick="showCheckout()" class="w-full bg-orange-600 text-white py-3 rounded-lg mt-4 font-semibold">Checkout</button>
      </div>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div id="checkoutModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg max-w-md w-full p-6 max-h-[90vh] overflow-y-auto">
      <h2 class="text-2xl font-bold mb-4">Complete Order</h2>
      <form id="checkoutForm">
        <input type="text" id="customerName" placeholder="Full Name" required class="w-full border p-3 rounded-lg mb-3">
        <input type="tel" id="customerPhone" placeholder="Phone Number" required class="w-full border p-3 rounded-lg mb-3">
        <textarea id="customerAddress" placeholder="Delivery Address" required class="w-full border p-3 rounded-lg mb-3"></textarea>
        
        <div class="bg-yellow-50 p-4 rounded-lg mb-3">
          <p class="font-semibold mb-2">Bank Transfer Details:</p>
          <p>Bank: GTBank</p>
          <p>Account: 0123456789</p>
          <p>Name: FASH VARIETIES</p>
          <p class="font-bold mt-2">Amount: <span id="finalAmount">₦0</span></p>
        </div>

        <label class="block mb-2 font-semibold">Upload Payment Receipt:</label>
        <input type="file" id="receiptFile" accept="image/*" required class="w-full border p-3 rounded-lg mb-4">
        
        <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold">Submit Order</button>
        <button type="button" onclick="hideCheckout()" class="w-full bg-gray-300 text-gray-700 py-3 rounded-lg font-semibold mt-2">Cancel</button>
      </form>
    </div>
  </div>

<script>
// 1. SUPABASE CONNECTION - Your keys are already inserted
const SUPABASE_URL = 'https://mvtbwydqcqhjfdabtrzg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iVZs4VWOz0AISXpQ8jlzqg_dsC8-WnF';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [];
let cart = JSON.parse(localStorage.getItem('cart')) || [];

// 2. LOAD PRODUCTS FROM SUPABASE
async function loadProducts() {
  const { data, error } = await supabase.from('products').select('*').eq('stock', 'gt', 0);
  if (error) { console.error(error); return; }
  products = data;
  renderProducts();
  updateCart();
}

// 3. RENDER PRODUCTS WITH VOLUME DISCOUNT BADGE
function renderProducts() {
  const grid = document.getElementById('products');
  grid.innerHTML = products.map(p => `
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
      <img src="${p.image1 || 'https://picsum.photos/400/400'}" class="w-full h-48 object-cover">
      <div class="p-4">
        <h3 class="font-bold text-lg mb-1">${p.name}</h3>
        <p class="text-gray-600 text-sm mb-2">${p.size || ''} ${p.capacity_number || ''}${p.capacity_unit || ''}</p>
        <p class="text-orange-600 font-bold text-xl mb-2">₦${p.price.toLocaleString()}</p>
        ${p.volume_discount && p.volume_discount.length? `
          <div class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded mb-2">
            Buy ${p.volume_discount[0].min_qty}+ get ${p.volume_discount[0].discount_percent}% off
          </div>
        ` : ''}
        <button onclick="addToCart(${p.id})" class="w-full bg-orange-600 text-white py-2 rounded-lg">Add to Cart</button>
      </div>
    </div>
  `).join('');
}

// 4. VOLUME DISCOUNT CALCULATOR
function getVolumeDiscount(price, qty, discountRules) {
  if (!discountRules ||!discountRules.length) return 0;
  const sorted = [...discountRules].sort((a,b) => b.min_qty - a.min_qty);
  const rule = sorted.find(r => qty >= r.min_qty);
  if (rule) return Math.floor(price * qty * rule.discount_percent / 100);
  return 0;
}

// 5. CART FUNCTIONS
function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(i => i.id === id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({...product, qty: 1});
  }
  saveCart();
}

function updateQty(id, qty) {
  if (qty <= 0) { cart = cart.filter(i => i.id!== id); }
  else { cart.find(i => i.id === id).qty = qty; }
  saveCart();
}

function saveCart() {
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCart();
}

function updateCart() {
  document.getElementById('cartCount').textContent = cart.reduce((sum, i) => sum + i.qty, 0);
  
  let subtotal = 0, totalDiscount = 0;
  document.getElementById('cartItems').innerHTML = cart.map(item => {
    const lineTotal = item.price * item.qty;
    const discount = getVolumeDiscount(item.price, item.qty, item.volume_discount);
    subtotal += lineTotal;
    totalDiscount += discount;
    
    return `
      <div class="flex justify-between items-center mb-4 pb-4 border-b">
        <div class="flex-1">
          <p class="font-semibold">${item.name}</p>
          <p class="text-sm text-gray-600">₦${item.price.toLocaleString()} x ${item.qty}</p>
          ${discount > 0? `<p class="text-sm text-green-600">Discount: -₦${discount.toLocaleString()}</p>` : ''}
        </div>
        <div class="flex items-center gap-2">
          <button onclick="updateQty(${item.id}, ${item.qty - 1})" class="bg-gray-200 px-2 rounded">-</button>
          <span>${item.qty}</span>
          <button onclick="updateQty(${item.id}, ${item.qty + 1})" class="bg-gray-200 px-2 rounded">+</button>
        </div>
      </div>
    `;
  }).join('');
  
  document.getElementById('subtotal').textContent = `₦${subtotal.toLocaleString()}`;
  document.getElementById('discount').textContent = `-₦${totalDiscount.toLocaleString()}`;
  document.getElementById('total').textContent = `₦${(subtotal - totalDiscount).toLocaleString()}`;
  document.getElementById('finalAmount').textContent = `₦${(subtotal - totalDiscount).toLocaleString()}`;
}

function toggleCart() {
  document.getElementById('cartSidebar').classList.toggle('translate-x-full');
}

// 6. CHECKOUT + RECEIPT UPLOAD TO SUPABASE STORAGE
function showCheckout() {
  if (cart.length === 0) { alert('Cart is empty'); return; }
  document.getElementById('checkoutModal').classList.remove('hidden');
}

function hideCheckout() {
  document.getElementById('checkoutModal').classList.add('hidden');
}

document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Uploading...';
  
  try {
    // Upload receipt to Supabase Storage
    const file = document.getElementById('receiptFile').files[0];
    const fileName = `receipt_${Date.now()}_${file.name}`;
    const { error: uploadError } = await supabase.storage.from('receipts').upload(fileName, file);
    if (uploadError) throw uploadError;
    
    const { data: { publicUrl } } = supabase.storage.from('receipts').getPublicUrl(fileName);
    
    // Calculate totals
    let subtotal = 0, totalDiscount = 0;
    const items = cart.map(i => {
      const discount = getVolumeDiscount(i.price, i.qty, i.volume_discount);
      subtotal += i.price * i.qty;
      totalDiscount += discount;
      return { id: i.id, name: i.name, qty: i.qty, price: i.price, discount };
    });
    
    // Save order to Supabase
    const { error: orderError } = await supabase.from('orders').insert({
      customer_name: document.getElementById('customerName').value,
      customer_phone: document.getElementById('customerPhone').value,
      customer_address: document.getElementById('customerAddress').value,
      items: items,
      subtotal: subtotal,
      discount: totalDiscount,
      total: subtotal - totalDiscount,
      receipt_url: publicUrl,
      status: 'awaiting_verification'
    });
    
    if (orderError) throw orderError;
    
    alert('Order submitted! We will verify payment and contact you.');
    cart = []; saveCart(); hideCheckout(); toggleCart();
    document.getElementById('checkoutForm').reset();
    
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Submit Order';
  }
});

// INIT
loadProducts();
</script>
</body>
</html>
